<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The City Remembers — Playlist</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding: 40px 20px 60px; }
  h1 { font-size: 28px; font-weight: 300; letter-spacing: .05em; margin-bottom: 4px; }
  .sub { font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 40px; letter-spacing: .1em; text-transform: uppercase; }
  .player-box { background: #111128; border-radius: 12px; padding: 32px; width: 100%; max-width: 520px; margin-bottom: 32px; }
  .now-playing-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: rgba(255,255,255,.35); margin-bottom: 10px; }
  .track-title { font-size: 22px; font-weight: 600; margin-bottom: 4px; min-height: 30px; }
  .track-perf { font-size: 13px; color: rgba(255,255,255,.45); font-style: italic; margin-bottom: 28px; min-height: 18px; }
  .progress-bar { height: 5px; background: rgba(255,255,255,.12); border-radius: 3px; cursor: pointer; margin-bottom: 10px; position: relative; }
  .progress-fill { height: 100%; background: #d4620a; border-radius: 3px; width: 0%; pointer-events: none; transition: width .1s linear; }
  .times { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,.35); margin-bottom: 28px; font-variant-numeric: tabular-nums; }
  .controls { display: flex; align-items: center; justify-content: center; gap: 24px; }
  .btn { background: none; border: none; cursor: pointer; color: rgba(255,255,255,.6); transition: color .15s; padding: 4px; }
  .btn:hover { color: #fff; }
  .btn-play { width: 56px; height: 56px; border-radius: 50%; background: #d4620a; display: flex; align-items: center; justify-content: center; transition: background .15s, transform .1s; }
  .btn-play:hover { background: #e8721a; transform: scale(1.05); }
  .btn-play:active { transform: scale(0.96); }
  .playlist { width: 100%; max-width: 520px; }
  .playlist-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-radius: 8px; cursor: pointer; transition: background .12s; }
  .playlist-item:hover { background: rgba(255,255,255,.06); }
  .playlist-item.active { background: rgba(212,98,10,.15); }
  .track-num { font-size: 12px; color: rgba(255,255,255,.25); width: 24px; text-align: center; flex-shrink: 0; }
  .track-num.playing { color: #d4620a; }
  .track-info { flex: 1; min-width: 0; }
  .track-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .track-name.active { color: #d4620a; }
  .track-act { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 1px; }
  audio { display: none; }
</style>
</head>
<body>

<h1>The City Remembers</h1>
<div class="sub">Original Songs</div>

<div class="player-box">
  <div class="now-playing-label">Now Playing</div>
  <div class="track-title" id="title">—</div>
  <div class="track-perf" id="perf">Select a track to begin</div>
  <div class="progress-bar" id="bar" onclick="seek(event)">
    <div class="progress-fill" id="fill"></div>
  </div>
  <div class="times"><span id="cur">0:00</span><span id="dur">0:00</span></div>
  <div class="controls">
    <button class="btn" onclick="prev()" title="Previous">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor"><rect x="3" y="4" width="3" height="14" rx="1"/><polygon points="19,4 8,11 19,18"/></svg>
    </button>
    <button class="btn btn-play" id="playbtn" onclick="togglePlay()">
      <svg id="play-icon" width="18" height="20" viewBox="0 0 18 20" fill="white"><polygon points="0,0 18,10 0,20"/></svg>
    </button>
    <button class="btn" onclick="next()" title="Next">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="currentColor"><polygon points="3,4 14,11 3,18"/><rect x="16" y="4" width="3" height="14" rx="1"/></svg>
    </button>
  </div>
</div>

<div class="playlist" id="playlist"></div>

<audio id="audio"></audio>

<script>
const tracks = [
  { num:"01", file:"01_arch_jingle.mp3",                     name:"The ARCH Jingle",                   act:"Pre-Show",  perf:"Arch ensemble" },
  { num:"02", file:"02_goodnight_my_darling.mp3",            name:"Goodnight My Darling",               act:"Act One",   perf:"Linda's Father" },
  { num:"03", file:"03_artificial_man.mp3",                  name:"Artificial Man",                     act:"Act One",   perf:"Arch — direct address" },
  { num:"04", file:"04_desperate_december.mp3",              name:"Desperate December",                 act:"Act One",   perf:"Hank" },
  { num:"05", file:"05_lifes_so_good.mp3",                   name:"Life's So Good",                     act:"Act One",   perf:"Skye" },
  { num:"06", file:"06_alternative_memories.mp3",            name:"Alternative Memories",               act:"Act One",   perf:"The Senator" },
  { num:"07", file:"07_removal_is_mercy.mp3",                name:"Removal is Mercy",                   act:"Act One",   perf:"Hank" },
  { num:"08", file:"09_walk_away.mp3",                       name:"Walk Away",                          act:"Act Two",   perf:"Arch — Senator scene" },
  { num:"09", file:"08_nobody_knows_if_im_snoring.mp3",      name:"Nobody Knows if I'm Snoring",        act:"Act Two",   perf:"Linda" },
  { num:"10", file:"10_memory_sweepers.mp3",                 name:"Memory Sweepers",                    act:"Act Two",   perf:"Hank and Linda" },
  { num:"11", file:"11_strangers_who_remember.mp3",          name:"Strangers Who Remember",             act:"Act Two",   perf:"Hank and Linda" },
  { num:"12", file:"12_fictional_proportion.mp3",            name:"Fictional Proportions",              act:"Act Two",   perf:"Linda" },
  { num:"13", file:"13_just_a_film_for_me.mp3",              name:"Just a Film for Me",                 act:"Act Two",   perf:"Linda and Arch" },
  { num:"14", file:"14_falling_in_love_on_aisle_three.mp3",  name:"Falling in Love on Aisle Three",     act:"Act Two",   perf:"Hank" },
  { num:"15", file:"15_desperate_december_fragment.mp3",     name:"Desperate December (fragment)",      act:"Act Two",   perf:"Hank" },
  { num:"16", file:"17_arch_works_it_out.mp3",               name:"Arch Works It Out",                  act:"Act Two",   perf:"Arch — direct address" },
  { num:"17", file:"18_hello_future.mp3",                    name:"Hello Future",                       act:"Finale",    perf:"Hank, Linda and company" },
  { num:"—",  file:"16_strangers_who_remember_reprise.mp3",  name:"Strangers Who Remember (reprise)",   act:"Archive",   perf:"Not in current show — kept for reference" },
  { num:"—",  file:"09_memories.mp3",                        name:"Memories",                           act:"Archive",   perf:"Not in current show — kept for reference" },
];

const audio = document.getElementById('audio');
let current = -1;

function fmt(s) {
  if (!s || isNaN(s)) return '0:00';
  return Math.floor(s/60) + ':' + (Math.floor(s%60) < 10 ? '0' : '') + Math.floor(s%60);
}

function buildPlaylist() {
  const pl = document.getElementById('playlist');
  tracks.forEach((t, i) => {
    const el = document.createElement('div');
    el.className = 'playlist-item';
    el.id = 'item-' + i;
    el.onclick = () => load(i, true);
    el.innerHTML = `
      <div class="track-num" id="num-${i}">${t.num}</div>
      <div class="track-info">
        <div class="track-name" id="name-${i}">${t.name}</div>
        <div class="track-act">${t.act} &nbsp;·&nbsp; ${t.perf}</div>
      </div>`;
    pl.appendChild(el);
  });
}

function load(i, play) {
  if (i < 0 || i >= tracks.length) return;
  // Clear previous
  if (current >= 0) {
    document.getElementById('item-' + current).classList.remove('active');
    document.getElementById('name-' + current).classList.remove('active');
    document.getElementById('num-' + current).classList.remove('playing');
    document.getElementById('num-' + current).textContent = tracks[current].num;
  }
  current = i;
  const t = tracks[i];
  audio.src = 'audio/' + t.file;
  document.getElementById('title').textContent = t.name;
  document.getElementById('perf').textContent = t.perf;
  document.getElementById('fill').style.width = '0%';
  document.getElementById('cur').textContent = '0:00';
  document.getElementById('dur').textContent = '0:00';
  document.getElementById('item-' + i).classList.add('active');
  document.getElementById('name-' + i).classList.add('active');
  document.getElementById('num-' + i).classList.remove('playing');
  document.getElementById('num-' + i).innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="#d4620a"><polygon points="0,0 12,6 0,12"/></svg>';
  document.getElementById('item-' + i).scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  if (play) {
    audio.play().catch(() => {});
    setPause();
  }
}

function togglePlay() {
  if (current < 0) { load(0, true); return; }
  if (audio.paused) { audio.play().catch(() => {}); setPause(); }
  else { audio.pause(); setPlay(); }
}

function setPlay() {
  document.getElementById('play-icon').innerHTML = '<polygon points="0,0 18,10 0,20"/>';
}
function setPause() {
  document.getElementById('play-icon').innerHTML = '<rect x="0" y="0" width="6" height="20" rx="1"/><rect x="12" y="0" width="6" height="20" rx="1"/>';
}

function prev() {
  if (current > 0) load(current - 1, !audio.paused);
}
function next() {
  if (current < tracks.length - 1) load(current + 1, true);
}

function seek(e) {
  if (!audio.duration) return;
  const bar = document.getElementById('bar');
  const r = bar.getBoundingClientRect();
  audio.currentTime = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)) * audio.duration;
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('fill').style.width = (audio.currentTime / audio.duration * 100) + '%';
  document.getElementById('cur').textContent = fmt(audio.currentTime);
  document.getElementById('dur').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', () => {
  if (current < tracks.length - 1) { load(current + 1, true); }
  else { setPlay(); }
});

audio.addEventListener('error', () => {
  document.getElementById('perf').textContent = 'File not found — place MP3s in audio/ folder';
});

buildPlaylist();
</script>
</body>
</html>
